services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docqa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docqa"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: .
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run python scripts/seed_demo_user.py &&
             uv run uvicorn src.main:make_app_default --factory --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/docqa
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://deeprouter.top/v1}
      GEMINI_MODEL_ID: ${GEMINI_MODEL_ID:-gemini-2.5-flash}
      APP_USER_ID: ${APP_USER_ID:-00000000-0000-0000-0000-000000000001}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./src:/app/src
      - ./persona:/app/persona
      - ./scripts:/app/scripts
      - ./config.yaml:/app/config.yaml
      - ./data/uploads:/app/data/uploads
      # Bind-mount host HF cache so we don't re-download BGE inside the
      # container (cn networks can't reach huggingface.co reliably; the
      # original named-volume `bge_cache` is preserved below as a fallback
      # but unused while this bind exists).
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    # --watch reloads the worker process on .py changes under /app/src,
    # mirroring uvicorn --reload on the backend. Without this, ingestion
    # code changes silently keep running stale logic until manual restart.
    command: sh -c "uv run arq src.worker.main.WorkerSettings --watch /app/src"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/docqa
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://deeprouter.top/v1}
      GEMINI_MODEL_ID: ${GEMINI_MODEL_ID:-gemini-2.5-flash}
      APP_USER_ID: ${APP_USER_ID:-00000000-0000-0000-0000-000000000001}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ./src:/app/src
      - ./persona:/app/persona
      - ./scripts:/app/scripts
      - ./config.yaml:/app/config.yaml
      - ./data/uploads:/app/data/uploads
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    command: pnpm dev
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  bge_cache:
