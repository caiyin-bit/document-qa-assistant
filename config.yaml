app:
  env: dev
  log_level: INFO

db:
  url: "postgresql+asyncpg://postgres:postgres@localhost:5432/docqa"

llm:
  # OpenAI-compatible gateway. Default points at deeprouter (CN-friendly
  # relay) using gemini-2.5-flash. The env vars below override
  # config.yaml at load time so deploys can pick a different model
  # without a code change.
  provider: deeprouter
  base_url: "https://deeprouter.top/v1"
  model_id: "gemini-2.5-flash"
  mode: instant
  api_key_env: GEMINI_API_KEY

embedding:
  model_path: "BAAI/bge-large-zh-v1.5"
  dim: 1024
  device: cpu

reranker:
  enabled: true
  model_path: "BAAI/bge-reranker-base"
  device: cpu
  top_n: 8   # keep top-N after rerank (out of top_k from hybrid recall)

memory:
  compress_trigger_threshold: 32   # 未压缩 messages 达到此数触发压缩
  compress_keep_recent: 16         # 触发后保留近 N 条原文(压缩切点位置)
  retrieve_top_k: 5
  similarity_threshold: 0.55

conversation:
  max_tool_iterations: 3

persona:
  identity_path: "persona/IDENTITY.md"
  soul_path: "persona/SOUL.md"

app_user:
  default_user_id_env: APP_USER_ID

retrieval:
  min_similarity: 0.35   # cosine; T2.5 to calibrate
  top_k: 16              # initial pool before threshold filter
  top_n: 8               # returned to LLM
  oversize_max_tokens: 500
  overlap_tokens: 80

ingestion:
  upload_max_bytes: 20971520   # 20 MB
  ingestion_timeout_seconds: 300
